<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OF Canchas" />
  <title>Ocean Front – Canchas</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #0f1f3d;
      --navy-light: #162848;
      --gold: #C9A84C;
      --gold-dim: rgba(201,168,76,0.15);
      --white: #f0f4ff;
      --gray: #8899bb;
      --red: #e05555;
      --green: #4caf7d;
      --radius: 14px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
    .app-shell { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: var(--navy-mid); border-bottom: 1px solid var(--gold-dim); padding: 16px 20px; }
    .logo-wrap { display: flex; align-items: center; gap: 12px; }
    .logo-o { width: 44px; height: 44px; border-radius: 50%; border: 5px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: var(--gold); flex-shrink: 0; }
    .header-title { font-size: 18px; font-weight: 600; color: var(--gold); letter-spacing: 0.5px; display: block; }
    .header-sub { font-size: 12px; color: var(--gray); display: block; }
    .tab-bar { display: flex; background: var(--navy-mid); border-bottom: 1px solid var(--gold-dim); padding: 0 8px; }
    .tab-btn { flex: 1; padding: 12px 4px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--gray); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .content { flex: 1; padding: 20px 16px; overflow-y: auto; }
    .section { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .section-title { font-size: 20px; font-weight: 500; margin-bottom: 20px; }
    .court-cards { display: flex; flex-direction: column; gap: 12px; }
    .court-card { background: var(--navy-light); border: 1px solid var(--gold-dim); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; text-align: left; width: 100%; }
    .court-card:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .court-emoji { font-size: 28px; }
    .court-name { font-size: 17px; font-weight: 500; color: var(--white); }
    .court-desc { font-size: 13px; color: var(--gray); }
    .date-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; scrollbar-width: none; }
    .date-scroll::-webkit-scrollbar { display: none; }
    .date-btn { flex-shrink: 0; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--navy-light); background: var(--navy-light); color: var(--gray); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .date-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
    .slots-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .slot { padding: 13px 16px; border-radius: var(--radius-sm); border: 1px solid; font-family: 'DM Sans', sans-serif; font-size: 14px; text-align: left; cursor: pointer; transition: all 0.15s; background: none; width: 100%; }
    .slot.available { background: var(--navy-light); border-color: rgba(240,244,255,0.1); color: var(--white); }
    .slot.available:hover { border-color: var(--gold); color: var(--gold); }
    .slot.selected { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); font-weight: 500; }
    .slot.taken { background: rgba(224,85,85,0.08); border-color: rgba(224,85,85,0.2); color: rgba(224,85,85,0.5); cursor: not-allowed; text-decoration: line-through; }
    .slot.past { background: rgba(136,153,187,0.05); border-color: rgba(136,153,187,0.1); color: rgba(136,153,187,0.3); cursor: not-allowed; }
    .summary-card { background: var(--navy-light); border: 1px solid var(--gold-dim); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
    .summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
    .summary-row:last-child { border-bottom: none; }
    .summary-row span { color: var(--gray); }
    .summary-row strong { color: var(--white); font-weight: 500; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--gray); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; background: var(--navy-light); border: 1px solid rgba(240,244,255,0.1); border-radius: var(--radius-sm); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--gold); }
    .form-group input::placeholder { color: rgba(136,153,187,0.5); }
    .form-group.row { display: flex; gap: 8px; }
    .form-group.row input { flex: 1; }
    .btn-primary { width: 100%; padding: 14px; background: var(--gold); color: var(--navy); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { padding: 12px 16px; background: var(--navy-light); color: var(--gold); border: 1px solid var(--gold-dim); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .back-btn { background: none; border: none; color: var(--gray); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; padding: 0; margin-bottom: 16px; }
    .res-card { background: var(--navy-light); border: 1px solid var(--gold-dim); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
    .res-card-top { display: flex; align-items: center; gap: 12px; }
    .res-emoji { font-size: 24px; flex-shrink: 0; }
    .res-court { font-size: 15px; font-weight: 500; }
    .res-detail { font-size: 13px; color: var(--gray); margin-top: 2px; }
    .cancel-btn { margin-left: auto; background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.2); color: var(--red); border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
    .admin-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .admin-tab-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--navy-light); background: var(--navy-light); color: var(--gray); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .admin-tab-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .admin-subtitle { font-size: 15px; font-weight: 500; color: var(--gray); margin-bottom: 14px; }
    .apt-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--navy-light); border: 1px solid var(--gold-dim); border-radius: var(--radius-sm); margin-bottom: 8px; font-size: 14px; }
    .error-msg { color: var(--red); font-size: 13px; margin: 8px 0; }
    .success-msg { color: var(--green); font-size: 13px; margin: 8px 0; }
    .empty-msg { color: var(--gray); font-size: 14px; text-align: center; padding: 30px 0; }
    .loading-msg { color: var(--gray); font-size: 14px; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyDdcqtmAllOV7iv0r5V3YJdcEqD4a_mfUw",
      authDomain: "of-canchas.firebaseapp.com",
      projectId: "of-canchas",
      storageBucket: "of-canchas.firebasestorage.app",
      messagingSenderId: "856514470352",
      appId: "1:856514470352:web:f4ebb5ced67acc887219d5"
    });
    const db = getFirestore(app);

    const COURTS = {
      grande: { id:'grande', name:'Cancha Grande', emoji:'⚽', desc:'Fútbol / Multipropósito' },
      chica:  { id:'chica',  name:'Cancha Chica',  emoji:'🏀', desc:'Basketball (medio campo)' }
    };
    const ADMIN_PASSWORD = 'oceanfront2024';

    let S = {
      tab:'reservar', step:1,
      selectedCourt:null, selectedDate:null, selectedSlot:null,
      residentName:'', apartmentNumber:'',
      adminLoggedIn:false, adminTab:'reservations',
      allReservations:[], approvedApartments:[], myReservations:[],
      myAptInput:'', loading:false, error:'', success:''
    };

    // DB helpers
    const getApts = async () => (await getDocs(collection(db,'apartments'))).docs.map(d=>({id:d.id,...d.data()}));
    const getAllRes = async () => {
      const q = query(collection(db,'reservations'), orderBy('date','asc'));
      return (await getDocs(q)).docs.map(d=>({id:d.id,...d.data()}));
    };
    const getResByApt = async apt => {
      const q = query(collection(db,'reservations'), where('apartment','==',apt));
      return (await getDocs(q)).docs.map(d=>({id:d.id,...d.data()}));
    };
    const addRes = data => addDoc(collection(db,'reservations'),{...data,createdAt:Timestamp.now()});
    const delRes = id => deleteDoc(doc(db,'reservations',id));
    const addApt = apt => addDoc(collection(db,'apartments'),{number:apt});
    const delApt = id => deleteDoc(doc(db,'apartments',id));

    // Time helpers
    function slots() {
      const r=[];
      for(let h=7;h<24;h+=1) r.push({label:`${fh(h)} – ${fh(h+1)}`,startHour:h});
      return r;
    }
    function fh(h) {
      if(h===0||h===24) return '12:00 AM';
      if(h===12) return '12:00 PM';
      return h<12?`${h}:00 AM`:`${h-12}:00 PM`;
    }
    const today = () => new Date().toISOString().split('T')[0];
    const isTaken = (res,court,date,h) => res.some(r=>r.court===court&&r.date===date&&r.startHour===h);
    const isPast = (date,h) => new Date(`${date}T${String(h).padStart(2,'0')}:00:00`) < new Date();
    const isFuture = r => new Date(`${r.date}T${String(r.startHour).padStart(2,'0')}:00:00`) >= new Date();

    // Render
    const $ = id => document.getElementById(id);
    function render() {
      $('app').innerHTML = html();
      bind();
    }

    function html() {
      return `<div class="app-shell">
        <header class="header"><div class="logo-wrap">
          <div class="logo-o">O</div>
          <div><span class="header-title">Ocean Front</span><span class="header-sub">Reserva de Canchas</span></div>
        </div></header>
        <div class="tab-bar">
          <button class="tab-btn ${S.tab==='reservar'?'active':''}" data-tab="reservar">＋ Reservar</button>
          <button class="tab-btn ${S.tab==='mis-reservas'?'active':''}" data-tab="mis-reservas">📋 Mis Reservas</button>
          <button class="tab-btn ${S.tab==='admin'?'active':''}" data-tab="admin">⚙️ Admin</button>
        </div>
        <div class="content">
          ${S.tab==='reservar'?pageReservar():''}
          ${S.tab==='mis-reservas'?pageMisReservas():''}
          ${S.tab==='admin'?pageAdmin():''}
        </div>
      </div>`;
    }

    function pageReservar() {
      if(S.step===1) return `<div class="section">
        <h2 class="section-title">Selecciona una cancha</h2>
        <div class="court-cards">
          <button class="court-card" data-court="grande"><span class="court-emoji">⚽</span><span class="court-name">Cancha Grande</span><span class="court-desc">Fútbol / Multipropósito</span></button>
          <button class="court-card" data-court="chica"><span class="court-emoji">🏀</span><span class="court-name">Cancha Chica</span><span class="court-desc">Basketball (medio campo)</span></button>
        </div>
        ${S.success?`<p class="success-msg" style="margin-top:16px">${S.success}</p>`:''}
        ${S.error?`<p class="error-msg">${S.error}</p>`:''}
      </div>`;

      if(S.step===2) {
        const c=COURTS[S.selectedCourt], sl=S.selectedDate||today();
        const dates=[];
        for(let i=0;i<14;i++){const d=new Date();d.setDate(d.getDate()+i);dates.push(d.toISOString().split('T')[0]);}
        return `<div class="section">
          <button class="back-btn" data-action="back">← Volver</button>
          <h2 class="section-title">${c.emoji} ${c.name}</h2>
          <div class="date-scroll">
            ${dates.map(d=>{
              const lbl=new Date(d+'T12:00:00').toLocaleDateString('es-PA',{weekday:'short',day:'numeric',month:'short'});
              return `<button class="date-btn ${d===sl?'active':''}" data-date="${d}">${lbl}</button>`;
            }).join('')}
          </div>
          <div class="slots-grid">
            ${slots().map(s=>{
              const tk=isTaken(S.allReservations,S.selectedCourt,sl,s.startHour);
              const ps=isPast(sl,s.startHour);
              const sel=S.selectedSlot===s.startHour;
              const cls=tk?'slot taken':ps?'slot past':sel?'slot selected':'slot available';
              return `<button class="${cls}" data-slot="${s.startHour}" ${tk||ps?'disabled':''}>${s.label}</button>`;
            }).join('')}
          </div>
          ${S.error?`<p class="error-msg">${S.error}</p>`:''}
          <button class="btn-primary" data-action="confirm-slot">Continuar →</button>
        </div>`;
      }

      if(S.step===3) {
        const c=COURTS[S.selectedCourt];
        const sl=slots().find(s=>s.startHour===S.selectedSlot)?.label||'';
        const dl=new Date(S.selectedDate+'T12:00:00').toLocaleDateString('es-PA',{weekday:'long',day:'numeric',month:'long'});
        return `<div class="section">
          <button class="back-btn" data-action="back">← Volver</button>
          <h2 class="section-title">Confirmar reserva</h2>
          <div class="summary-card">
            <div class="summary-row"><span>Cancha</span><strong>${c.emoji} ${c.name}</strong></div>
            <div class="summary-row"><span>Fecha</span><strong>${dl}</strong></div>
            <div class="summary-row"><span>Horario</span><strong>${sl}</strong></div>
          </div>
          <div class="form-group"><label>Nombre del residente</label><input type="text" id="rName" placeholder="Tu nombre completo" value="${S.residentName}" /></div>
          <div class="form-group"><label>Número de apartamento</label><input type="text" id="rApt" placeholder="Ej: 12A" value="${S.apartmentNumber}" /></div>
          ${S.error?`<p class="error-msg">${S.error}</p>`:''}
          <button class="btn-primary" data-action="submit" ${S.loading?'disabled':''}>${S.loading?'Reservando...':'Confirmar Reserva ✓'}</button>
        </div>`;
      }
      return '';
    }

    function resCard(r, canCancel=false) {
      const c=COURTS[r.court];
      const sl=slots().find(s=>s.startHour===r.startHour)?.label||'';
      const dl=new Date(r.date+'T12:00:00').toLocaleDateString('es-PA',{weekday:'short',day:'numeric',month:'short'});
      return `<div class="res-card"><div class="res-card-top">
        <span class="res-emoji">${c?.emoji}</span>
        <div><div class="res-court">${c?.name}</div><div class="res-detail">${dl} · ${sl}</div><div class="res-detail">Apto ${r.apartment} · ${r.name}</div></div>
        ${canCancel?`<button class="cancel-btn" data-cancel="${r.id}">✕</button>`:''}
      </div></div>`;
    }

    function pageMisReservas() {
      const fut=S.myReservations.filter(isFuture);
      return `<div class="section">
        <h2 class="section-title">Mis Reservas</h2>
        <div class="form-group row">
          <input type="text" id="myApt" placeholder="Número de apartamento" value="${S.myAptInput}" />
          <button class="btn-secondary" data-action="search-my">Buscar</button>
        </div>
        ${S.loading?`<p class="loading-msg">Cargando...</p>`:''}
        ${S.myAptInput&&!S.loading?(fut.length===0?`<p class="empty-msg">No tienes reservas activas.</p>`:fut.map(r=>resCard(r,true)).join('')):''}
      </div>`;
    }

    function pageAdmin() {
      if(!S.adminLoggedIn) return `<div class="section">
        <h2 class="section-title">Panel de Administración</h2>
        <div class="form-group"><label>Contraseña</label><input type="password" id="adminPw" placeholder="Contraseña" /></div>
        ${S.error?`<p class="error-msg">${S.error}</p>`:''}
        <button class="btn-primary" data-action="admin-login">Ingresar</button>
      </div>`;

      const fut=S.allReservations.filter(isFuture);
      return `<div class="section">
        <div class="admin-tabs">
          <button class="admin-tab-btn ${S.adminTab==='reservations'?'active':''}" data-atab="reservations">Reservas</button>
          <button class="admin-tab-btn ${S.adminTab==='apartments'?'active':''}" data-atab="apartments">Apartamentos</button>
        </div>
        ${S.adminTab==='reservations'?`
          <p style="font-size:15px;font-weight:500;color:var(--gray);margin-bottom:14px">Reservas activas (${fut.length})</p>
          ${fut.length===0?`<p class="empty-msg">No hay reservas activas.</p>`:fut.map(r=>resCard(r,true)).join('')}
        `:`
          <p style="font-size:15px;font-weight:500;color:var(--gray);margin-bottom:14px">Apartamentos aprobados</p>
          <div class="form-group row">
            <input type="text" id="newApt" placeholder="Ej: 12A" />
            <button class="btn-secondary" data-action="add-apt">Agregar</button>
          </div>
          ${S.error?`<p class="error-msg">${S.error}</p>`:''}
          ${S.success?`<p class="success-msg">${S.success}</p>`:''}
          <div>${S.approvedApartments.map(a=>`
            <div class="apt-item"><span>Apto ${a.number}</span><button class="cancel-btn" data-del-apt="${a.id}">✕</button></div>
          `).join('')}</div>
        `}
      </div>`;
    }

    function bind() {
      // Tabs
      document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',async()=>{
        S.tab=el.dataset.tab; S.error=''; S.success='';
        if(S.tab==='admin'&&S.adminLoggedIn){S.loading=true;render();S.allReservations=await getAllRes();S.approvedApartments=await getApts();S.loading=false;}
        render();
      }));

      // Courts
      document.querySelectorAll('[data-court]').forEach(el=>el.addEventListener('click',async()=>{
        S.selectedCourt=el.dataset.court; S.selectedDate=today(); S.selectedSlot=null; S.error=''; S.success='';
        S.loading=true; render();
        S.allReservations=await getAllRes();
        S.loading=false; S.step=2; render();
      }));

      // Dates
      document.querySelectorAll('[data-date]').forEach(el=>el.addEventListener('click',()=>{S.selectedDate=el.dataset.date;S.selectedSlot=null;render();}));

      // Slots
      document.querySelectorAll('[data-slot]').forEach(el=>el.addEventListener('click',()=>{if(!el.disabled){S.selectedSlot=parseInt(el.dataset.slot);render();}}));

      // Back
      document.querySelectorAll('[data-action="back"]').forEach(el=>el.addEventListener('click',()=>{S.step--;S.error='';render();}));

      // Confirm slot
      document.querySelectorAll('[data-action="confirm-slot"]').forEach(el=>el.addEventListener('click',()=>{
        if(S.selectedSlot===null){S.error='Por favor selecciona un horario.';render();return;}
        S.step=3;S.error='';render();
      }));

      // Submit reservation
      document.querySelectorAll('[data-action="submit"]').forEach(el=>el.addEventListener('click',async()=>{
        const name=$('rName')?.value.trim(), apt=$('rApt')?.value.trim().toUpperCase();
        S.residentName=name; S.apartmentNumber=apt;
        if(!name||!apt){S.error='Por favor completa todos los campos.';render();return;}
        const approved=await getApts();
        if(!approved.some(a=>a.number.toUpperCase()===apt)){S.error='Este apartamento no está registrado. Contacta al administrador.';render();return;}
        const myRes=await getResByApt(apt);
        if(myRes.some(isFuture)){S.error='Tu apartamento ya tiene una reserva activa.';render();return;}
        S.loading=true;S.error='';render();
        try{
          await addRes({court:S.selectedCourt,date:S.selectedDate,startHour:S.selectedSlot,name,apartment:apt});
          S.success='¡Reserva confirmada! 🎉';S.step=1;S.selectedCourt=null;S.selectedSlot=null;S.residentName='';S.apartmentNumber='';
        }catch(e){S.error='Error al guardar. Intenta de nuevo.';}
        S.loading=false;render();
      }));

      // Search my reservations
      document.querySelectorAll('[data-action="search-my"]').forEach(el=>el.addEventListener('click',async()=>{
        const apt=$('myApt')?.value.trim().toUpperCase();
        S.myAptInput=apt;if(!apt)return;
        S.loading=true;render();S.myReservations=await getResByApt(apt);S.loading=false;render();
      }));

      // Cancel reservation
      document.querySelectorAll('[data-cancel]').forEach(el=>el.addEventListener('click',async()=>{
        if(!confirm('¿Cancelar esta reserva?'))return;
        await delRes(el.dataset.cancel);
        S.allReservations=S.allReservations.filter(r=>r.id!==el.dataset.cancel);
        S.myReservations=S.myReservations.filter(r=>r.id!==el.dataset.cancel);
        render();
      }));

      // Admin login
      document.querySelectorAll('[data-action="admin-login"]').forEach(el=>el.addEventListener('click',async()=>{
        if($('adminPw')?.value!==ADMIN_PASSWORD){S.error='Contraseña incorrecta.';render();return;}
        S.adminLoggedIn=true;S.loading=true;render();
        S.allReservations=await getAllRes();S.approvedApartments=await getApts();
        S.loading=false;render();
      }));

      // Admin tabs
      document.querySelectorAll('[data-atab]').forEach(el=>el.addEventListener('click',()=>{S.adminTab=el.dataset.atab;S.error='';S.success='';render();}));

      // Add apartment
      document.querySelectorAll('[data-action="add-apt"]').forEach(el=>el.addEventListener('click',async()=>{
        const apt=$('newApt')?.value.trim().toUpperCase();
        if(!apt)return;
        if(S.approvedApartments.some(a=>a.number.toUpperCase()===apt)){S.error='Ese apartamento ya está registrado.';render();return;}
        await addApt(apt);S.approvedApartments=await getApts();S.success=`Apto ${apt} agregado.`;S.error='';render();
      }));

      // Delete apartment
      document.querySelectorAll('[data-del-apt]').forEach(el=>el.addEventListener('click',async()=>{
        if(!confirm('¿Eliminar este apartamento?'))return;
        await delApt(el.dataset.delApt);S.approvedApartments=await getApts();render();
      }));
    }

    render();
  </script>
</body>
</html>
